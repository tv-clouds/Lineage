name: Lineage Price 每小时币价更新

on:
  schedule:
    # 北京时间 09:05, 10:05 ... 直到 22:05 运行
    # UTC 时间 01:05, 02:05 ... 直到 14:05
    - cron: '5 1-14 * * *'
  workflow_dispatch:

concurrency:
  group: price-task
  cancel-in-progress: true

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # 已移除 cache 选项，不再检查 lock 文件

      - name: 3. 安装依赖
        # 使用 ci 代替 install 可以更快且更稳定（如果已有 lock 文件）
        # 如果没有 lock 文件，建议加上超时限制
        run: npm install --no-audit --no-fund

      - name: 4. 执行爬虫脚本
        # 增加超时控制，防止脚本卡死占用额度
        run: timeout 300s node fetch.js 

      - name: 5. 提交并推送 JSON 数据
        # 增加 --allow-empty 或者更强力的 pull 策略
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot-Price"
          
          # 确保拉取最新远程代码，防止推送冲突
          git fetch origin main
          git checkout main
          
          git add data.json history.json
          
          if git diff --cached --quiet; then
            echo "数据未发生变动，跳过本次提交。"
          else
            # 这里的 --no-verify 可以跳过可能存在的本地检查
            git commit -m "Price Update: $(date '+%Y-%m-%d %H:%M')" --no-verify
            git push origin main
          fi
