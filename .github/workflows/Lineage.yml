name: Lineage Price 每小时币价更新

on:
  schedule:
    - cron: '5 * * * *' # 每小时第 5 分钟运行
  workflow_dispatch:      # 允许手动点击按钮触发

concurrency:
  group: price-task
  cancel-in-progress: true

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # 开启缓存，加快后续运行速度

      - name: 3. 安装依赖并运行爬虫
        run: |
          # 如果你的 fetch.js 在根目录，就去掉 cd Price
          # 如果在 Price 文件夹内，保留 cd Price
          [ -d "Price" ] && cd Price 
          npm install axios
          node fetch.js

      - name: 4. 提交并推送数据
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot-Price"
          
          # 自动识别 Price 目录或根目录下的 json
          git add *.json Price/*.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "币价数据未变动，跳过提交。"
          else
            git commit -m "Price Update: $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
