name: Lineage Price 每小时币价更新

on:
  schedule:
    - cron: '5 * * * *' # 每小时第 5 分钟运行，避开整点拥堵
  workflow_dispatch:      # 允许手动点击按钮立即更新

concurrency:
  group: price-task
  cancel-in-progress: true

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 3. 安装依赖并执行爬虫
        run: |
          # 直接在根目录运行
          npm install axios
          node fetch.js

      - name: 4. 提交并推送 JSON 数据
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot-Price"
          
          # 仅添加根目录下的 json 文件
          git add *.json
          
          if git diff --cached --quiet; then
            echo "币价数据未变动，跳过本次提交。"
          else
            git commit -m "Price Update: $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
