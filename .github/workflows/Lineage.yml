name: Lineage Price 每小时币价更新

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

concurrency:
  group: price-task
  cancel-in-progress: true

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # 自动缓存 node_modules

      - name: 3. 安装依赖
        run: npm install

      - name: 4. 执行爬虫脚本
        run: node fetch.js

      - name: 5. 提交并推送 JSON 数据
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot-Price"
          
          # 确保添加根目录下的两个结果文件
          git add data.json history.json
          
          if git diff --cached --quiet; then
            echo "数据未发生变动，跳过本次提交。"
          else
            git commit -m "Price Update: $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
